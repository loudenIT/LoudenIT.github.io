<canvas id="matrix"></canvas>
<style>
  body { margin: 0; background: black; overflow-x: hidden; font-family: 'Courier New', monospace; }
  #matrix { position: fixed; top: 0; left: 0; z-index: -1; }
  .content { position: relative; z-index: 1; color: #00ff41; text-shadow: 0 0 5px #00ff41; padding: 50px; }
  .box { background: rgba(0, 20, 0, 0.8); border: 1px solid #00ff41; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
</style>

<script>
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
  const fontSize = 16;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px arial";
    drops.forEach((y, i) => {
      const text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, y * fontSize);
      if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }
  setInterval(draw, 33);
</script>
